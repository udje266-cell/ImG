# Compile l'APK Android dans le cloud GitHub (SDK préinstallé sur les runners).
# Déclenchement : bouton « Run workflow » (onglet Actions) ou push sur main.
# L'APK est publié en artefact téléchargeable : Actions → run → « ImG-debug-apk ».
name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # le CLI Capacitor exige Node >= 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21 # les plugins Android de Capacitor 7 compilent en Java 21

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImG-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
