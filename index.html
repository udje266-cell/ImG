<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ImG — God Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
    <style>
      :root {
        --panel: rgba(24, 30, 44, 0.72);
        --panel-border: rgba(255, 255, 255, 0.16);
        --accent: #ffd66e;
        --text: #f2f5fb;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e14;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
      #game { display: block; width: 100vw; height: 100vh; touch-action: none; cursor: crosshair; }

      /* --- Ressources (haut-gauche), en pastilles --- */
      #resources {
        position: fixed; top: calc(10px + env(safe-area-inset-top)); left: calc(10px + env(safe-area-inset-left));
        display: flex; flex-direction: column; gap: 6px; user-select: none; pointer-events: none;
      }
      .pill {
        display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 8px;
        background: var(--panel); border: 1px solid var(--panel-border); border-radius: 999px;
        color: var(--text); font-size: 14px; font-weight: 600; min-width: 118px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      .pill .ico { font-size: 16px; line-height: 1; }
      .pill .bar { position: relative; flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.15); overflow: hidden; }
      .pill .bar > i { position: absolute; inset: 0; width: 0%; border-radius: 3px; background: var(--accent); transition: width 0.2s; }
      #clock {
        margin-top: 2px; padding: 4px 12px; background: var(--panel); border: 1px solid var(--panel-border);
        border-radius: 12px; color: var(--text); font-size: 12px; font-weight: 500; opacity: 0.92;
      }
      #flash {
        margin-top: 2px; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;
        color: #1a1204; background: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        opacity: 0; transform: translateY(-4px); transition: opacity 0.2s, transform 0.2s;
      }
      #flash.show { opacity: 1; transform: translateY(0); }

      /* --- Réglages (haut-droite) --- */
      #btn-settings {
        position: fixed; top: calc(10px + env(safe-area-inset-top)); right: calc(10px + env(safe-area-inset-right));
        width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--panel-border);
        background: var(--panel); color: var(--text); font-size: 20px; cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }

      /* --- Barre d'action (bas-centre), boutons ronds --- */
      #actionbar {
        position: fixed; left: 50%; transform: translateX(-50%);
        bottom: calc(14px + env(safe-area-inset-bottom));
        display: flex; align-items: flex-end; gap: 14px; user-select: none;
      }
      .action { display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .action > button {
        width: 60px; height: 60px; border-radius: 50%; font-size: 26px;
        border: 2px solid var(--panel-border); background: var(--panel); color: var(--text);
        cursor: pointer; touch-action: manipulation; transition: transform 0.1s, border-color 0.15s, background 0.15s;
        box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      }
      .action > button:active { transform: scale(0.92); }
      .action > button.active { border-color: var(--accent); background: rgba(94, 74, 22, 0.92); }
      .action > button:disabled { opacity: 0.4; cursor: not-allowed; }
      .action > .label { font-size: 11px; font-weight: 600; color: var(--text); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
      .action.small > button { width: 46px; height: 46px; font-size: 20px; }
      #actionbar .sep { width: 1px; align-self: stretch; margin: 8px 2px; background: rgba(255,255,255,0.14); }

      #perf {
        position: fixed; top: 60px; right: 12px; display: none; padding: 8px 12px; border-radius: 10px;
        background: var(--panel); border: 1px solid var(--panel-border);
        color: #9fe6b0; font: 12px/1.5 ui-monospace, monospace; pointer-events: none; user-select: none; white-space: pre;
      }
      #help {
        position: fixed; bottom: 4px; left: 12px; color: rgba(230, 233, 240, 0.4);
        font: 11px/1.4 system-ui, sans-serif; pointer-events: none; user-select: none;
      }
      @media (pointer: coarse) { #help { display: none; } }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="resources">
      <div class="pill" title="Foi"><span class="ico">💎</span><span id="faith-val">—</span><span class="bar"><i id="faith-bar"></i></span></div>
      <div class="pill" title="Dévotion"><span class="ico">✨</span><span id="devotion-val">—</span></div>
      <div id="clock">—</div>
      <div id="flash"></div>
    </div>

    <button id="btn-settings" title="Perfs (P)" aria-label="Réglages">⚙️</button>

    <div id="actionbar">
      <div class="action"><button id="tool-raise" title="Élever">⛰️</button><span class="label">Élever</span></div>
      <div class="action"><button id="tool-lower" title="Abaisser">🕳️</button><span class="label">Abaisser</span></div>
      <div class="action"><button id="tool-flatten" title="Aplanir" disabled>🔒</button><span class="label">Aplanir</span></div>
      <div class="action"><button id="tool-rain" title="Pluie" disabled>🔒</button><span class="label">Pluie</span></div>
      <div class="sep"></div>
      <div class="action small"><button id="btn-save" title="Sauvegarder (S)">💾</button><span class="label">Sauver</span></div>
      <div class="action small"><button id="btn-load" title="Charger (L)" disabled>📂</button><span class="label">Charger</span></div>
    </div>

    <div id="perf"></div>
    <div id="help">Clic gauche : sculpter (Maj : inverser) · Clic droit : caméra · Molette : zoom · Q/E : pivoter · Espace : pause · 1/2/3 : vitesse</div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
